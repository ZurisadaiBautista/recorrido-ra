<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recorrido RA - Bienvenida</title>

  <style>
    body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:18px}
    .card{max-width:560px;width:100%;background:rgba(255,255,255,.06);padding:18px;border-radius:18px}
    h1{margin:0 0 8px;font-size:20px}
    p{margin:0 0 14px;opacity:.9;line-height:1.4}
    button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer;background:#fff;color:#0b1220}
    .note{margin-top:10px;opacity:.75;font-size:13px}
    #ar-root{position:fixed;inset:0;display:none;background:#000}

    /* ✅ ARREGLO DEL "ZOOM" (sin tocar resolución de cámara)
       AR.js crea un <video id="arjs-video">. Le forzamos:
       - que ocupe toda la pantalla
       - y que NO recorte (contain)
    */
    #arjs-video{
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: contain !important; /* <-- clave para quitar zoom */
      z-index: 0 !important;
      background: #000 !important;
    }

    /* A-Frame canvas también full-screen */
    canvas{
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }
  </style>
</head>

<body>
  <div class="wrap" id="start-screen">
    <div class="card">
      <h1>Recorrido RA - Unicaribe</h1>
      <p>Presiona <b>Iniciar cámara</b> y apunta al marcador <b>Hiro</b>.</p>
      <button id="start-btn">Iniciar cámara</button>
      <div class="note" id="status">Estado: listo.</div>
      <div class="note">Ajuste aplicado: “zoom” reducido con <code>object-fit: contain</code>.</div>
    </div>
  </div>

  <div id="ar-root"></div>

  <script>
    const startBtn = document.getElementById("start-btn");
    const startScreen = document.getElementById("start-screen");
    const arRoot = document.getElementById("ar-root");
    const statusEl = document.getElementById("status");
    function setStatus(msg){ statusEl.textContent = "Estado: " + msg; }

    function loadScriptOnce(src){
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src; s.async = true;
        s.onload = () => resolve(src);
        s.onerror = () => reject(new Error("No se pudo cargar: " + src));
        document.head.appendChild(s);
      });
    }

    async function loadWithFallback(name, urls){
      for (const url of urls){
        try{
          setStatus(`cargando ${name}…`);
          await loadScriptOnce(url);
          setStatus(`${name} cargado ✅`);
          return;
        } catch(e){ console.warn(e.message); }
      }
      throw new Error(`Falló la carga de ${name}. Posible bloqueo de red/CDN.`);
    }

    function mountScene(){
      // Sin sourceWidth/sourceHeight para no romper streams en Android
      const arjsConfig = `sourceType: webcam; facingMode: environment; debugUIEnabled: false;`;

      arRoot.innerHTML = `
        <a-scene
          embedded
          vr-mode-ui="enabled: false"
          renderer="antialias: true; precision: mediump;"
          arjs="${arjsConfig}"
        >
          <a-marker preset="hiro">
            <a-plane position="0 0.8 0" rotation="-90 0 0" width="1.9" height="1.0" color="#111" opacity="0.75"></a-plane>

            <a-text value="¡Bienvenida a Unicaribe!"
              align="center"
              position="0 0.81 0.35"
              rotation="-90 0 0"
              width="3.3"
              color="#FFFFFF"></a-text>

            <a-text value="Apunta al marcador Hiro"
              align="center"
              position="0 0.81 0.10"
              rotation="-90 0 0"
              width="2.6"
              color="#FFFFFF"></a-text>
          </a-marker>

          <a-entity camera></a-entity>
        </a-scene>
      `;
    }

    async function startAR(){
      startBtn.disabled = true;

      await loadWithFallback("A-Frame", [
        "https://aframe.io/releases/1.4.2/aframe.min.js",
        "https://unpkg.com/aframe@1.4.2/dist/aframe.min.js",
        "https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"
      ]);

      await loadWithFallback("AR.js", [
        "https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js",
        "https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js",
        "https://unpkg.com/ar.js@3.4.5/aframe/build/aframe-ar.js"
      ]);

      startScreen.style.display = "none";
      arRoot.style.display = "block";

      mountScene();
      setStatus("AR iniciado ✅");
    }

    startBtn.addEventListener("click", () => {
      startAR().catch(err => {
        alert("Error: " + err.message);
        setStatus("ERROR ❌ " + err.message);
        console.error(err);
        startBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
