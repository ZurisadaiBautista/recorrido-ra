<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recorrido RA</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled: false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;">

<a-marker preset="hiro">

<a-box position="0 0.5 0" color="#2196F3"></a-box>

<a-text
value="Biblioteca\nUnicaribe"
align="center"
position="0 1.2 0"
color="white"
width="4">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<div class="hint">
1) Permite el acceso a la cámara. 2) Apunta al marcador "Hiro".
</div>

</body>
</html>
